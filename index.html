
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIM Vault — Failsafe v18</title>
  <meta name="color-scheme" content="light">
  <style>
    /* Failsafe: no variables, no gradients, no fancy layout */
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: #ffffff;      /* hard white */
      color: #000000;           /* hard black */
      font: 18px/1.5 -apple-system, system-ui, Segoe UI, Roboto, Arial, sans-serif;
    }
    header { text-align: center; padding: 24px 16px 6px; }
    h1 { margin: 0 0 8px; font-size: 34px; }
    p  { margin: 0; color: #222; }
    .coin-wrap {
      display: flex; align-items: center; justify-content: center;
      padding: 18px 0;
    }
    .coin {
      width: 220px; height: 220px; border-radius: 50%;
      border: 4px solid #ffd700;  /* gold ring */
      padding: 14px; background: #0b1220;  /* dark bezel */
    }
    .coin img {
      display: block; width: 100%; height: 100%;
      border-radius: 50%; object-fit: cover; background: #0b1220;
    }
    .cta { display: flex; gap: 12px; justify-content: center; padding: 10px 16px; flex-wrap: wrap; }
    .btn {
      display: inline-block; text-decoration: none; font-weight: 800; letter-spacing: .4px;
      background: #0b1220; color: #ffffff; padding: 10px 14px; border-radius: 10px; border: 2px solid #0b1220;
    }
    main { max-width: 900px; margin: 20px auto 40px; padding: 0 16px; text-align: center; }
    footer { text-align: center; color: #444; padding: 30px 16px; }
    .debug { text-align:center; font-size: 12px; color: #666; padding: 6px 0 0; }
  </style>
</head>
<body>
  <header>
    <h1>AIM Vault</h1>
    <p>Home of the AI Mastery Lab & AIM Coin</p>
  </header>

  <!-- Always-visible SVG coin; no external files needed -->
  <div class="coin-wrap">
    <div class="coin">
      <img id="coin-img" alt="AIM Vault Coin"
           src="data:image/svg+xml;utf8,\
           <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 600'>\
             <defs>\
               <radialGradient id='g' cx='50%25' cy='35%25' r='65%25'>\
                 <stop offset='0%25' stop-color='%23ffffff' stop-opacity='0.06'/>\
                 <stop offset='60%25' stop-color='%230b1220'/>\
                 <stop offset='100%25' stop-color='%23090f1b'/>\
               </radialGradient>\
               <linearGradient id='shine' x1='0' y1='0' x2='0' y2='1'>\
                 <stop offset='0%25' stop-color='%23ffd700' stop-opacity='0.45'/>\
                 <stop offset='100%25' stop-color='%23ffd700' stop-opacity='0.05'/>\
               </linearGradient>\
             </defs>\
             <circle cx='300' cy='300' r='290' fill='url(%23g)'/>\
             <circle cx='300' cy='300' r='250' fill='url(%23shine)' opacity='0.22'/>\
             <text x='300' y='332' font-family='Arial,Helvetica,sans-serif' font-size='140' text-anchor='middle' fill='%23e7ecf5' letter-spacing='3'>AIM</text>\
           </svg>">
    </div>
  </div>
  <div id="debug" class="debug">Showing inline SVG coin (no external image needed).</div>

  <div class="cta">
    <a class="btn" href="#about">Explore AIM Vault</a>
    <a class="btn" href="#demo">Watch Demo</a>
  </div>

  <main id="about">
    <h2>Welcome to AIM Vault</h2>
    <p>AIM Vault is where AI innovation meets financial mastery. We’re building tools, strategies, and a community around intelligent crypto trading.</p>
  </main>
